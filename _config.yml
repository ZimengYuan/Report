title: Daily Research Report
description: Automated AI research reports using last30days
theme: minima
repository: ZimengYuan/Report

# GitHub Pages configuration
github:
  repository_url: https://github.com/ZimengYuan/Report

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Exclude unnecessary files
exclude:
  - scripts/
  - memory/
  - .env
  - logs/
  - artifacts/

# Collections configuration
collections:
  research:
    output: true
    permalink: /research/:path/
