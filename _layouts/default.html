<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h1, h2, h3 {
            color: #1a1a1a;
        }
        .lead {
            font-size: 1.1em;
            color: #666;
        }
        .research-schedule {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .research-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .section-title {
            margin-bottom: 12px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
            margin: 16px 0 24px;
        }
        .report-card {
            background: linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
            border: 1px solid #dbe7f3;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(17, 51, 83, 0.06);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .report-card h3,
        .report-card h4 {
            margin: 0;
        }
        .card-kicker {
            font-size: 0.78em;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #2d6ea3;
        }
        .card-summary {
            margin: 0;
            color: #506172;
            font-size: 0.95em;
        }
        .card-meta-list {
            display: grid;
            gap: 6px;
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 0.92em;
            color: #31485e;
        }
        .card-meta-list strong {
            color: #18344d;
        }
        .card-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: fit-content;
            padding: 9px 14px;
            border-radius: 999px;
            background: #0d5ea6;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        .card-link:hover {
            background: #084a85;
            text-decoration: none;
        }
        .card-link-row {
            margin-top: auto;
        }
        .card-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .card-chip {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eaf3fb;
            color: #27557b;
            font-size: 0.82em;
            font-weight: 600;
        }
        .page-meta {
            background: #f8f9fa;
            border-radius: 5px;
            padding: 14px 16px;
            margin-bottom: 20px;
        }
        .page-meta p {
            margin: 4px 0;
        }
        footer {
            border-top: 1px solid #eee;
            margin-top: 40px;
            padding-top: 20px;
            font-size: 0.9em;
            color: #666;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            overflow-x: auto;
            border-radius: 5px;
        }
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
        }
        blockquote {
            border-left: 4px solid #0066cc;
            margin: 0;
            padding-left: 15px;
            color: #666;
        }
        @media (max-width: 640px) {
            body {
                padding: 16px;
            }
            .report-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{{ '/' | relative_url }}">首页</a>
            <a href="{{ '/research.html' | relative_url }}">归档</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>由 <a href="https://last30days.io">last30days</a> 提供支持的自动化研究系统。触发方式为 cron，每天 10:00 和 20:00（北京时间）自动更新。</p>
    </footer>
</body>
</html>
