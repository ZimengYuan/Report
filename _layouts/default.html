<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0066cc;
        }
        nav a:hover {
            text-decoration: underline;
        }
        h1, h2, h3 {
            color: #1a1a1a;
        }
        .lead {
            font-size: 1.1em;
            color: #666;
        }
        .research-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        footer {
            border-top: 1px solid #eee;
            margin-top: 40px;
            padding-top: 20px;
            font-size: 0.9em;
            color: #666;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            overflow-x: auto;
            border-radius: 5px;
        }
        code {
            background: #f4f4f4;
            padding: 2px 5px;
            border-radius: 3px;
        }
        blockquote {
            border-left: 4px solid #0066cc;
            margin: 0;
            padding-left: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="{{ site.baseurl }}/">Home</a>
            <a href="{{ site.baseurl }}/research.html">Archive</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>Automated research system using <a href="https://last30days.io">last30days</a>. Updated daily at 10:00 and 20:00 Beijing time.</p>
    </footer>
</body>
</html>
